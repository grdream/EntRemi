services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # Coolify will detect this port and automatically configure the reverse proxy (Traefik/Caddy)
    ports:
      - "80"
    environment:
      - APP_NAME=${APP_NAME:-EntRemi}
      - APP_ENV=production
      - APP_KEY=${APP_KEY}
      - APP_DEBUG=false
      # Coolify automatically injects SERVICE_FQDN_APP
      - APP_URL=${SERVICE_FQDN_APP:-http://localhost}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@entremi.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=entremi
      - DB_USERNAME=entremi_user
      - DB_PASSWORD=${DB_PASSWORD}
      - CACHE_DRIVER=file
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - LOG_CHANNEL=stderr
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - entremi_storage:/var/www/html/storage
      - entremi_bootstrap:/var/www/html/bootstrap/cache
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://127.0.0.1/ > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  db:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=entremi
      - MYSQL_USER=entremi_user
      - MYSQL_PASSWORD=${DB_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-${DB_PASSWORD}}
    volumes:
      - entremi_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  entremi_storage:
  entremi_bootstrap:
  entremi_db_data:
